services:
  app:
    build:
      context: .
      args:
        PHP_IMAGE: mirror.gcr.io/library/php:8.4-fpm
        HTTP_PROXY: ""
        HTTPS_PROXY: ""
        http_proxy: ""
        https_proxy: ""
        NO_PROXY: "*"
    user: "1000:1000"
    volumes:
      - .:/var/www
    environment:
      FACT_CHECK_API_URL: http://agent-system:8080
    depends_on:
      db:
        condition: service_healthy
      agent-system:
        condition: service_started
    networks:
      - laravel

  nginx:
    image: mirror.gcr.io/library/nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel

  node:
    image: mirror.gcr.io/library/node:22-alpine
    user: "1000:1000"
    working_dir: /var/www
    volumes:
      - .:/var/www
    profiles:
      - tools
    networks:
      - laravel

  agent-system:
    image: agentsystem-agent-system:latest
    ports:
      - "8080:8080"
    networks:
      - laravel

  db:
    image: mirror.gcr.io/library/mysql:8.0
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - laravel

networks:
  laravel:
    driver: bridge

volumes:
  dbdata:
